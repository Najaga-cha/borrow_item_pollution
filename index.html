<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@500;600;700&display=swap');

@font-face{
  font-family:'TH Sarabun PSK';
  src: url('https://cdn.jsdelivr.net/gh/SarabunConsortium/TH-Sarabun-PSK@master/THSarabunPSK%20Regular.ttf') format('truetype');
  font-weight:400; font-style:normal; font-display:swap;
}
@font-face{
  font-family:'TH Sarabun PSK';
  src: url('https://cdn.jsdelivr.net/gh/SarabunConsortium/TH-Sarabun-PSK@master/THSarabunPSK%20Bold.ttf') format('truetype');
  font-weight:700; font-style:normal; font-display:swap;
}
@font-face{
  font-family:'TH Sarabun PSK';
  src: url('https://cdn.jsdelivr.net/gh/SarabunConsortium/TH-Sarabun-PSK@master/THSarabunPSK%20Italic.ttf') format('truetype');
  font-weight:400; font-style:italic; font-display:swap;
}
@font-face{
  font-family:'TH Sarabun PSK';
  src: url('https://cdn.jsdelivr.net/gh/SarabunConsortium/TH-Sarabun-PSK@master/THSarabunPSK%20BoldItalic.ttf') format('truetype');
  font-weight:700; font-style:italic; font-display:swap;
}

:root[data-theme="light"]{
  --bg: #f3f7f6;
  --bg-grad1: #e9f9f3;
  --bg-grad2: #eef6ff;
  --card: #ffffff;
  --text: #16302b;
  --subtle: #5b6b68;
  --border: #e1e8e6;
  --input-bg: #ffffff;
  --input-border: #d7e2df;
  --header-bg: linear-gradient(120deg,#0f766e,#0891b2 55%,#0369a1);
  --header-text: #ffffff;
  --primary: #0f766e;
  --primary-dark: #0d5f59;
  --chip-bg: #f4faf8;
  --shadow: 0 1px 3px rgba(15,60,50,.08), 0 6px 18px rgba(15,60,50,.06);
}
:root[data-theme="dark"]{
  --bg: #0f1a18;
  --bg-grad1: #0b1512;
  --bg-grad2: #0c1620;
  --card: #16211f;
  --text: #eaf3f1;
  --subtle: #9db3af;
  --border: #223330;
  --input-bg: #101c1a;
  --input-border: #2a3d39;
  --header-bg: linear-gradient(120deg,#0b3d38,#0e5266 55%,#0b3f5e);
  --header-text: #eafffb;
  --primary: #2dd4bf;
  --primary-dark: #14b8a6;
  --chip-bg: #16211f;
  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
}

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }
body{
  font-family: 'Sarabun', 'Kanit', system-ui, sans-serif;
  background:
    radial-gradient(1200px 500px at 10% -5%, var(--bg-grad1), transparent),
    radial-gradient(1200px 500px at 100% 0%, var(--bg-grad2), transparent),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
}
h1,h2,h3{ font-family:'Kanit','Sarabun',sans-serif; }

.header-band{ background: var(--header-bg); color: var(--header-text); border-radius: 0 0 28px 28px; box-shadow: var(--shadow); }
.header-title{ color: var(--header-text); }
.header-sub{ color: rgba(255,255,255,.85); }
.logo-badge{ width:44px; height:44px; border-radius:14px; background:rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center; font-size:22px; backdrop-filter: blur(4px);}

.tabbar{ display:flex; gap:8px; flex-wrap:wrap; }
.tab-btn{ padding:10px 16px; border-radius:12px; background:rgba(255,255,255,.12); color:var(--header-text); font-weight:600; border:1px solid rgba(255,255,255,.25); cursor:pointer; transition:.15s; font-size:14px;}
.tab-btn:hover{ background:rgba(255,255,255,.22); }
.tab-active{ background:#ffffff; color:#0f766e; }

.btn-theme{ width:38px; height:38px; border-radius:10px; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3); cursor:pointer; font-size:16px;}
.btn-ghost{ padding:9px 14px; border-radius:10px; background:var(--card); border:1px solid var(--border); color:var(--text); cursor:pointer; font-weight:600; font-size:13.5px; transition:.15s;}
.btn-ghost:hover{ background: var(--chip-bg); }
.btn-primary{ padding:10px 18px; border-radius:10px; background: var(--primary); color:#fff; border:none; cursor:pointer; font-weight:700; font-size:14px; box-shadow: 0 4px 12px rgba(15,118,110,.3); transition:.15s;}
.btn-primary:hover{ background: var(--primary-dark); }
.btn-danger{ padding:9px 14px; border-radius:10px; background:#fef2f2; color:#dc2626; border:1px solid #fecaca; cursor:pointer; font-weight:600; font-size:13.5px;}
:root[data-theme="dark"] .btn-danger{ background:#3a1414; color:#f87171; border-color:#5c1f1f; }
.btn-early-return{ padding:9px 14px; border-radius:10px; background:#eff6ff; color:#0369a1; border:1px solid #bae6fd; cursor:pointer; font-weight:600; font-size:13.5px; transition:.15s;}
.btn-early-return:hover{ background:#dbeafe; }
:root[data-theme="dark"] .btn-early-return{ background:#0c1c2e; color:#7dd3fc; border-color:#0e3a5c; }

.card{ background: var(--card); border:1px solid var(--border); border-radius:18px; box-shadow: var(--shadow); }

.lbl{ display:block; font-size:13px; font-weight:600; color:var(--subtle); margin-bottom:5px; }
.inp{ width:100%; padding:10px 12px; border-radius:10px; border:1.5px solid var(--input-border); background: var(--input-bg); color:var(--text); font-size:14px; font-family:inherit; }
.inp:focus{ outline:none; border-color: var(--primary); }
.inp-sm{ padding:6px 8px; border-radius:8px; border:1.5px solid var(--input-border); background:var(--input-bg); color:var(--text); font-size:12.5px; font-family:inherit; }
.hint-be{ font-size:11.5px; color:var(--subtle); margin-top:3px; }
.empty-hint{ padding:20px; text-align:center; color:var(--subtle); background:var(--chip-bg); border-radius:12px; font-size:13.5px; border:1px dashed var(--border);}

.cat-chip{ padding:9px 16px; border-radius:999px; border:2px solid var(--c); background:var(--c2); color:var(--text); font-weight:600; font-size:13.5px; cursor:pointer; transition:.15s;}
:root[data-theme="dark"] .cat-chip{ background:transparent; }
.cat-chip-active{ background: var(--c); color:#fff; }

.ms-dropdown{ position:relative; }
.ms-dropdown-btn{ width:100%; display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px 12px; border-radius:10px; border:1.5px solid var(--input-border); background:var(--input-bg); color:var(--text); font-size:13.5px; font-family:inherit; cursor:pointer; text-align:left; }
.ms-dropdown-btn:hover{ border-color: var(--primary); }
.ms-dropdown-btn-open{ border-color: var(--primary); }
.ms-dropdown-caret{ color:var(--subtle); font-size:11px; transition:.15s; }
.ms-dropdown-btn-open .ms-dropdown-caret{ transform:rotate(180deg); }
.ms-dropdown-panel{ position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:30; background:var(--card); border:1.5px solid var(--input-border); border-radius:12px; box-shadow: var(--shadow); padding:8px; }
.ms-dropdown-search{ width:100%; margin-bottom:6px; }
.ms-dropdown-list{ max-height:200px; overflow-y:auto; }
.ms-dropdown-empty{ padding:14px 8px; text-align:center; color:var(--subtle); font-size:13px; }
.ms-dropdown-item{ display:flex; align-items:center; gap:9px; padding:8px 9px; border-radius:8px; cursor:pointer; font-size:13.5px; }
.ms-dropdown-item:hover{ background: var(--chip-bg); }
.ms-dropdown-item input{ width:16px; height:16px; accent-color: var(--primary); flex-shrink:0; }

.cat-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
.cat-card{ position:relative; display:flex; flex-direction:column; align-items:center; gap:4px; text-align:center; padding:16px 10px 12px; border-radius:14px; border:2px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; transition:.15s; }
.cat-card:hover{ border-color:var(--c); background:var(--c2); }
:root[data-theme="dark"] .cat-card:hover{ background:rgba(255,255,255,.04); }
.cat-card-active{ border-color:var(--c); background:var(--c2); box-shadow:0 0 0 2px var(--c) inset; }
:root[data-theme="dark"] .cat-card-active{ background:rgba(255,255,255,.05); }
.cat-card-check{ position:absolute; top:8px; right:10px; font-size:13px; line-height:1; }
.cat-card-icon{ font-size:26px; line-height:1; }
.cat-card-name{ font-weight:700; font-size:13.5px; }
.cat-card-count{ font-size:11px; color:var(--subtle); }

.tool-panel{ border:1.5px solid var(--border); border-left:6px solid var(--c); border-radius:14px; overflow:hidden; }
.tool-panel-head{ padding:10px 14px; font-weight:700; background: var(--c2); color:var(--text); }
:root[data-theme="dark"] .tool-panel-head{ background:rgba(255,255,255,.03); }
.tool-list{ padding:6px 10px 10px; }
.tool-row{ display:flex; align-items:center; gap:10px; padding:8px 6px; border-bottom:1px solid var(--border); }
.tool-row:last-child{ border-bottom:none; }
.tool-row-disabled{ opacity:.5; }
.chk{ width:17px; height:17px; accent-color: var(--primary); }
.qty-badge{ font-size:11.5px; padding:3px 9px; border-radius:999px; background:#dcfce7; color:#15803d; font-weight:700; white-space:nowrap;}
:root[data-theme="dark"] .qty-badge{ background:#0e2a1c; color:#4ade80; }
.qty-zero{ background:#fee2e2; color:#b91c1c; }
:root[data-theme="dark"] .qty-zero{ background:#3a1414; color:#f87171; }
.qty-input{ width:56px; padding:5px 6px; border-radius:8px; border:1.5px solid var(--input-border); background:var(--input-bg); color:var(--text); font-size:13px; }

.success-banner{ background: linear-gradient(90deg,#ecfdf5,#eff6ff); border:1.5px solid #a7f3d0; border-radius:16px; padding:16px 20px; }
:root[data-theme="dark"] .success-banner{ background: linear-gradient(90deg,#0e2a1c,#0c1c2e); border-color:#14532d; }

.pill{ display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:700; background:var(--chip-bg); color:var(--subtle); }
.pill-ok{ background:#dcfce7; color:#15803d; }
:root[data-theme="dark"] .pill-ok{ background:#0e2a1c; color:#4ade80; }
.pill-warn{ background:#fef3c7; color:#92400e; }
:root[data-theme="dark"] .pill-warn{ background:#3a2a0e; color:#fbbf24; }
.pill-danger{ background:#fee2e2; color:#b91c1c; }
:root[data-theme="dark"] .pill-danger{ background:#3a1414; color:#f87171; }
.pill-clock{ background:rgba(255,255,255,.16); color:var(--header-text); border:1px solid rgba(255,255,255,.28); font-weight:600; font-size:12.5px; padding:5px 12px; letter-spacing:.2px; }
.mini-chip{ font-size:11px; padding:2px 8px; border-radius:999px; background: color-mix(in srgb, var(--c) 18%, transparent); border:1px solid var(--c); color:var(--text); white-space:nowrap;}

.table-wrap{ overflow-x:auto; }
.data-table{ width:100%; border-collapse:collapse; font-size:13px; }
.data-table th{ text-align:left; padding:9px 10px; background:var(--chip-bg); color:var(--subtle); font-weight:700; white-space:nowrap; border-bottom:2px solid var(--border);}
.data-table td{ padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
.data-table tr:hover td{ background: var(--chip-bg); }

.icon-btn{ background:none; border:none; cursor:pointer; font-size:15px; padding:4px 6px; border-radius:6px; }
.icon-btn:hover{ background: var(--chip-bg); }

.tool-tab{ padding:8px 14px; border-radius:10px; background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600; font-size:13.5px; }
.tool-tab-active{ background:var(--primary); color:#fff; border-color:var(--primary); }

.modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px; }
.modal-card{ background:var(--card); border-radius:18px; padding:24px; max-width:640px; width:100%; max-height:88vh; overflow-y:auto; box-shadow: var(--shadow); }

.cal-grid{ display:grid; grid-template-columns: repeat(7,1fr); gap:6px; }
.cal-grid-head{ margin-bottom:4px; }
.cal-headcell{ text-align:center; font-size:12px; font-weight:700; color:var(--subtle); padding:4px; }
.cal-cell{ min-height:64px; border:1px solid var(--border); border-radius:10px; padding:6px; cursor:pointer; transition:.1s; }
.cal-cell:hover{ background: var(--chip-bg); }
.cal-empty{ border:none; cursor:default; }
.cal-daynum{ font-size:12.5px; font-weight:700; }
.cal-has{ background: #ecfdf5; border-color:#6ee7b7; }
:root[data-theme="dark"] .cal-has{ background:#0e2a1c; border-color:#14532d; }
.cal-sel{ outline:2px solid var(--primary); }
.cal-dot{ font-size:10px; margin-top:4px; color:#15803d; font-weight:700; }
:root[data-theme="dark"] .cal-dot{ color:#4ade80; }

.borrow-item-card{ padding:12px 14px; border:1px solid var(--border); border-radius:12px; margin-bottom:10px; background:var(--chip-bg); }

.bar-track{ height:9px; background: var(--chip-bg); border-radius:999px; overflow:hidden; border:1px solid var(--border);}
.bar-fill{ height:100%; border-radius:999px; transition:width .3s; }

.subtle{ color: var(--subtle); }
.hidden{ display:none; }

/* ============ Print ============ */
#print-area{ display:none; }
.slip-page{ font-family:'TH Sarabun PSK','Sarabun',sans-serif; font-size:16pt; color:#000; padding:14mm 16mm; }
.slip-header-line{ text-align:center; font-weight:700; font-size:22pt; margin-bottom:16px; }
.slip-field-row{ font-size:16pt; margin-bottom:10px; }
.slip-field-row b{ font-weight:700; }
.slip-field-two{ display:flex; gap:24px; }
.slip-field-two > div{ flex:1; }
.slip-section-title{ font-weight:700; font-size:16pt; margin:18px 0 8px; }
.slip-table{ width:100%; border-collapse:collapse; font-size:16pt; margin:6px 0 18px; }
.slip-table th,.slip-table td{ border:1px solid #000; padding:6px 8px; }
.slip-table th{ background:#f0f0f0; text-align:left; }
.slip-table td.c{ text-align:center; }
.slip-table tr{ break-inside:avoid; page-break-inside:avoid; }
.sig-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px 24px; margin-top:48px; break-inside:avoid; page-break-inside:avoid; }
.sig-box{ font-size:14pt; }
.sig-role{ font-weight:700; margin-bottom:22px; }
.sig-line{ margin-bottom:14px; }
.sig-sub{ margin-bottom:4px; }
.sig-sub-indent{ margin-left:2.6em; }

@media print{
  .header-band{ display:none !important; }
  body.printing-slip #main-content{ display:none !important; }
  body.printing-slip #print-area{ display:block !important; }
  body.printing-report .no-print{ display:none !important; }
  @page{ size:A4; margin:10mm; }
}

</style>
</head>

const MEM = {}; // fallback in-memory store (used if Firestore is unreachable)

async function stGet(key, shared){
  // ข้อมูลที่ไม่ต้องแชร์ (เช่น ธีมของหน้าจอ) เก็บไว้ในเครื่องด้วย localStorage พอ
  if(!shared){
    try{
      const v = localStorage.getItem('local:'+key);
      return v !== null ? JSON.parse(v) : null;
    }catch(e){ return MEM[key] !== undefined ? MEM[key] : null; }
  }
  try{
    const snap = await db.collection(FS_COLLECTION).doc(key).get();
    if(!snap.exists) return null;
    const data = snap.data();
    return data && ('value' in data) ? data.value : null;
  }catch(e){ return MEM[key] !== undefined ? MEM[key] : null; }
}
async function stSet(key, value, shared){
  if(!shared){
    try{ localStorage.setItem('local:'+key, JSON.stringify(value)); }
    catch(e){ MEM[key] = value; }
    return;
  }
  try{ await db.collection(FS_COLLECTION).doc(key).set({ value: value }); }
  catch(e){ MEM[key] = value; }
}

/* ===================== Availability logic ===================== */
// A unit is unavailable if referenced by an 'active' borrow
function unitIsHeld(equipmentId){
  for(const b of state.borrows){
    if(b.status !== 'active') continue;
    const list = (b.itemsExpanded && b.itemsExpanded.length) ? b.itemsExpanded : b.items;
    for(const it of list){
      if(it.equipmentId === equipmentId && !it.returned) return true;
    }
  }
  return false;
}

/* ===================== Per-item return tracking ===================== */
// Returns one row per item-name within a borrow, with per-unit return progress
function itemGroupsForBorrow(b){
  return (b.items||[]).map(it=>{
    const unitIds = (it.equipmentIds && it.equipmentIds.length) ? it.equipmentIds.slice() : (it.equipmentId? [it.equipmentId] : []);
    const returnedUnitIds = unitIds.filter(id=>{
      const rec = (b.itemsExpanded||[]).find(x=>x.equipmentId===id);
      return rec && rec.returned;
    });
    const remainingUnitIds = unitIds.filter(id=>!returnedUnitIds.includes(id));
    return {
      name: it.name, category: it.category, assetCode: it.assetCode, qty: it.qty,
      unitIds, returnedUnitIds, remainingUnitIds,
      returnedQty: returnedUnitIds.length, remainingQty: remainingUnitIds.length,
    };
  });
}
function borrowReturnedUnitCount(b){ return (b.itemsExpanded||[]).filter(x=>x.returned).length; }
function borrowTotalUnitCount(b){ return (b.itemsExpanded && b.itemsExpanded.length) ? b.itemsExpanded.length : (b.items||[]).reduce((s,i)=>s+i.qty,0); }
function isBorrowFullyReturned(b){
  if(!b.itemsExpanded || !b.itemsExpanded.length) return false;
  return b.itemsExpanded.every(x=>x.returned);
}
function isBorrowPartiallyReturned(b){
  const c = borrowReturnedUnitCount(b);
  return c>0 && !isBorrowFullyReturned(b);
}
function borrowStatusBadge(b){
  if(b.status==='early-returned') return '<span class="pill pill-ok">↩️ คืนก่อนกำหนด</span>';
  if(b.status==='auto-returned') return '<span class="pill pill-warn">⏰ คืนตามกำหนดอัตโนมัติ</span>';
  if(b.status==='returned') return '<span class="pill pill-ok">คืนแล้ว</span>';
  if(isBorrowPartiallyReturned(b)) return `<span class="pill pill-warn">คืนบางส่วน (${borrowReturnedUnitCount(b)}/${borrowTotalUnitCount(b)})</span>`;
  return '<span class="pill pill-ok">อนุมัติ/ใช้งานอยู่</span>';
}
function itemsSummaryLine(b){
  // one-line summary showing returned progress per item, e.g. "กล้อง x2 (คืนแล้ว 1), เชือก x1"
  return itemGroupsForBorrow(b).map(g=>{
    const extra = g.returnedQty>0 ? ` (คืนแล้ว ${g.returnedQty}/${g.qty})` : '';
    return esc(g.name)+' x'+g.qty+extra;
  }).join(', ');
}
function isCalibExpired(item){
  if(!item.nextCalib) return false;
  const today = todayISO();
  return item.nextCalib < today;
}
function isBorrowable(item){
  return item.useStatus === 'ใช้งานได้' && !isCalibExpired(item) && !unitIsHeld(item.id);
}
// group by category+name -> {name, category, available: [items], count}
function groupEquipment(category){
  const groups = {};
  state.equipment.filter(e=>e.category===category).forEach(e=>{
    const key = e.name;
    if(!groups[key]) groups[key] = { name: e.name, category, items: [], availItems: [] };
    groups[key].items.push(e);
    if(isBorrowable(e)) groups[key].availItems.push(e);
  });
  return Object.values(groups).sort((a,b)=>a.name.localeCompare(b.name,'th'));
}


function nextBorrowCode(dept){
  const prefix = dept;
  const count = state.borrows.filter(b=>b.dept===dept).length + 1;
  return `${prefix}-${String(count).padStart(4,'0')}/${beYear(new Date().getFullYear())}`;
}
function nextReturnCode(dept){
  const prefix = dept;
  const count = state.returns.filter(r=>r.dept===dept).length + 1;
  return `${prefix}-คส-${String(count).padStart(4,'0')}/${beYear(new Date().getFullYear())}`;
}


const root = document.getElementById('app');
function render(){
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = (active && typeof active.selectionStart==='number') ? active.selectionStart : null;
  const selEnd = (active && typeof active.selectionEnd==='number') ? active.selectionEnd : null;

  root.innerHTML = `
    ${renderHeader()}
    <div class="max-w-7xl mx-auto px-4 pb-16" id="main-content">
      ${state.tab==='borrow' ? renderBorrowTab() : ''}
      ${state.tab==='return' ? (state.loggedIn ? renderReturnTab() : renderLogin('return')) : ''}
      ${state.tab==='manage' ? (state.loggedIn ? renderManageTab() : renderLogin('manage')) : ''}
      ${state.tab==='reports' ? (state.loggedIn ? renderReportsTab() : renderLogin('reports')) : ''}
    </div>
    ${renderPrintSlipContainer()}
    ${state.pendingBorrow ? renderConfirmBorrowModal() : ''}
  `;
  attachHandlers();

  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart!==null && el.setSelectionRange){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }

  if(state.tab==='reports' && state.loggedIn) drawReportCharts();
}

async function buildPDFDataUriFromHTML(html, css){
  if(!window.html2canvas || !window.jspdf) throw new Error('ไม่พบไลบรารีสร้าง PDF (html2canvas/jsPDF)');
  const { jsPDF } = window.jspdf;

  const container = document.createElement('div');
  container.style.position = 'fixed';
  container.style.left = '-99999px';
  container.style.top = '0';
  container.style.width = '210mm';
  container.style.background = '#ffffff';
  container.innerHTML = `<style>${css}</style>${html}`;
  document.body.appendChild(container);

  // รอให้ฟอนต์ TH Sarabun PSK โหลดเสร็จ + เลย์เอาต์เสถียรก่อนจับภาพ
  try{
    await Promise.all([
      document.fonts.load("400 16pt 'TH Sarabun PSK'"),
      document.fonts.load("700 16pt 'TH Sarabun PSK'"),
    ]);
    await document.fonts.ready;
  }catch(e){ /* ถ้าโหลดฟอนต์ไม่สำเร็จ จะ fallback ไปฟอนต์อื่นแทน */ }
  await new Promise(r=>setTimeout(r, 60));

  const PDF_PAGE_WIDTH_MM = 210, PDF_PAGE_HEIGHT_MM = 297, PDF_EXTRA_GAP_MM = 10; // ขนาด A4 + ระยะห่างพิเศษจากหัวกระดาษเมื่อถูกดันไปหน้าใหม่

  // ป้องกันไม่ให้แถวในตารางรายการเครื่องมือถูกตัด/ซ้อนกันข้ามหน้ากระดาษ -> ถ้าแถวไหนไม่พอ ดันทั้งแถวไปเริ่มหน้าใหม่
  try{
    const rows = Array.from(container.querySelectorAll('.slip-table tr'));
    for(const row of rows){
      const containerRect = container.getBoundingClientRect();
      const ratioMmPerPx = PDF_PAGE_WIDTH_MM / containerRect.width;
      const rowRect = row.getBoundingClientRect();
      const topMm = (rowRect.top - containerRect.top) * ratioMmPerPx;
      const bottomMm = (rowRect.bottom - containerRect.top) * ratioMmPerPx;
      for(let boundary = PDF_PAGE_HEIGHT_MM; boundary < bottomMm; boundary += PDF_PAGE_HEIGHT_MM){
        if(topMm < boundary && boundary < bottomMm){
          const gapPx = (boundary - topMm + PDF_EXTRA_GAP_MM) / ratioMmPerPx;
          const colCount = row.children.length || 1;
          const spacer = document.createElement('tr');
          spacer.innerHTML = `<td colspan="${colCount}" style="border:none; padding:0; height:${gapPx}px;"></td>`;
          row.parentNode.insertBefore(spacer, row);
          break;
        }
      }
    }
  }catch(e){ /* ถ้าคำนวณไม่ได้ ปล่อยผ่าน ใช้เลย์เอาต์ปกติ */ }

  // ป้องกันไม่ให้ส่วนลงชื่อ (sig-grid) ถูกตัดข้ามหน้ากระดาษ -> ถ้าไม่พอ ดันทั้งบล็อกไปหน้าถัดไป
  try{
    const sigEl = container.querySelector('.sig-grid');
    if(sigEl){
      const containerRect = container.getBoundingClientRect();
      const ratioMmPerPx = PDF_PAGE_WIDTH_MM / containerRect.width;
      const sigRect = sigEl.getBoundingClientRect();
      const topMm = (sigRect.top - containerRect.top) * ratioMmPerPx;
      const bottomMm = (sigRect.bottom - containerRect.top) * ratioMmPerPx;
      for(let boundary = PDF_PAGE_HEIGHT_MM; boundary < bottomMm; boundary += PDF_PAGE_HEIGHT_MM){
        if(topMm < boundary && boundary < bottomMm){
          const extraPx = (boundary - topMm + PDF_EXTRA_GAP_MM) / ratioMmPerPx;
          const currentMarginTop = parseFloat(getComputedStyle(sigEl).marginTop) || 0;
          sigEl.style.marginTop = (currentMarginTop + extraPx) + 'px';
          break;
        }
      }
    }
  }catch(e){ /* ถ้าคำนวณไม่ได้ ปล่อยผ่าน ใช้เลย์เอาต์ปกติ */ }

  let dataUri;
  try{
    const canvas = await html2canvas(container, { scale: 1.3, useCORS: true, backgroundColor: '#ffffff' });
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pageWidth;
    const imgHeight = canvas.height * imgWidth / canvas.width;
    const imgData = canvas.toDataURL('image/jpeg', 0.72);

    let heightLeft = imgHeight;
    let position = 0;
    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
    while(heightLeft > 0){
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }
    dataUri = pdf.output('datauristring');
  } finally {
    document.body.removeChild(container);
  }
  return dataUri;
}
async function buildSlipPDFDataUri(b){

function dataUriToBlob(dataUri){
  const [header, base64] = dataUri.split(',');
  const mimeMatch = header.match(/data:(.*?);base64/);
  const mime = mimeMatch ? mimeMatch[1] : 'application/pdf';
  const bin = atob(base64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type: mime});
}


async function uploadSlipPDFToCloudinary(b){
  if(!CLOUDINARY_READY) throw new Error('ยังไม่ได้ตั้งค่า Cloudinary (CLOUDINARY_CONFIG)');
  const pdfDataUri = await buildSlipPDFDataUri(b);
  const blob = dataUriToBlob(pdfDataUri);
  const form = new FormData();
  form.append('file', blob, pdfFileName(b));
  form.append('upload_preset', CLOUDINARY_CONFIG.uploadPreset);
  form.append('public_id', `borrow-slips/${b.code.replace(/[\/\\]/g,'-')}-${Date.now()}`);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/raw/upload`, {
    method: 'POST', body: form,
  });
  if(!res.ok){
    const t = await res.text().catch(()=> '');
    throw new Error('อัปโหลดไฟล์ขึ้น Cloudinary ไม่สำเร็จ: ' + t);
  }
  const data = await res.json();
  if(!data.secure_url) throw new Error('ไม่พบลิงก์ไฟล์จาก Cloudinary');
  return data.secure_url;
}

  const startDow = first.getDay();
  const daysInMonth = new Date(c.year, c.month+1, 0).getDate();
  const borrowsByDay = {};
  state.borrows.forEach(b=>{

function fiscalRange(fyBE){
  const gy = fyBE - 543;
  return { start: `${gy-1}-10-01`, end: `${gy}-09-30` };
}
function halfRange(mode, fyBE){
  const gy = fyBE - 543;
  if(mode==='oct-mar') return { start: `${gy-1}-10-01`, end: `${gy}-03-31` };
  return { start: `${gy}-04-01`, end: `${gy}-09-30` };
}
function monthRange(monthIdx, gy){
  const start = new Date(gy, monthIdx, 1).toISOString().slice(0,10);
  const end = new Date(gy, monthIdx+1, 0).toISOString().slice(0,10);
  return {start, end};
}
function weekRange(startISO){
  const s = new Date(startISO+'T00:00:00');
  const e = new Date(s); e.setDate(e.getDate()+6);
  return { start: startISO, end: e.toISOString().slice(0,10) };
}
function getReportRange(){
  const r = state.reports;
  if(r.mode==='week') return r.weekStart? weekRange(r.weekStart) : weekRange(todayISO());
  if(r.mode==='month') return monthRange(r.month, r.year);
  if(r.mode==='half') return halfRange(r.half, r.fy);
  if(r.mode==='fy') return fiscalRange(r.fy);
  return monthRange(new Date().getMonth(), new Date().getFullYear());
}
function filterBorrowsByRange(range){
  return state.borrows.filter(b=> b.borrowDate>=range.start && b.borrowDate<=range.end);
}
// ตัวกรองรายงาน: หน่วยงาน / จังหวัด / ประเภทเครื่องมือ (เลือกได้หลายอัน, ว่าง = ไม่กรอง)
function applyReportFilters(list){
  const r = state.reports;
  const depts = r.filterDepts||[], provs = r.filterProvinces||[], cats = r.filterCategories||[];
  return list.filter(b=>{
    if(depts.length && !depts.includes(b.dept)) return false;
    if(provs.length && !provs.includes(b.province)) return false;
    if(cats.length && !(b.items||[]).some(it=>cats.includes(it.category))) return false;
    return true;
  });
}
function reportItemMatchesCatFilter(category){
  const cats = state.reports.filterCategories||[];
  return !cats.length || cats.includes(category);
}
function toggleReportFilter(type, value){
  const key = type==='dept'?'filterDepts': type==='province'?'filterProvinces':'filterCategories';
  const arr = state.reports[key];
  const i = arr.indexOf(value);
  if(i>=0) arr.splice(i,1); else arr.push(value);
  render();
}
function clearReportFilters(){
  state.reports.filterDepts = []; state.reports.filterProvinces = []; state.reports.filterCategories = [];
  state.reports.openFilterDropdown = null;
  render();
}
async function clearDashboardData(){
  const ok1 = confirm('ยืนยันล้างข้อมูล Dashboard?\n\nการดำเนินการนี้จะลบ "ใบยืมทั้งหมด" ที่ใช้แสดงรายงาน/สถิติออกจากระบบถาวร (รายชื่อเครื่องมือในคลังจะไม่ถูกลบ)');
  if(!ok1) return;
  const ok2 = confirm('ยืนยันอีกครั้ง: ข้อมูลใบยืมทั้งหมดจะถูกลบและกู้คืนไม่ได้ ต้องการดำเนินการต่อหรือไม่?');
  if(!ok2) return;
  state.borrows = [];

function renderReportsTab(){
  const range = getReportRange();
  const list = applyReportFilters(filterBorrowsByRange(range));
  const byEquip = {}, byDept = {}, byCat = {};
  let totalQty = 0, returnedCount = 0;
  list.forEach(b=>{
    if(b.status==='returned' || b.status==='auto-returned' || b.status==='early-returned') returnedCount++;
    b.items.forEach(it=>{
      if(!reportItemMatchesCatFilter(it.category)) return;
      byDept[b.dept] = (byDept[b.dept]||0) + it.qty;
      byEquip[it.name] = (byEquip[it.name]||0) + it.qty;
      byCat[it.category] = (byCat[it.category]||0) + it.qty;
      totalQty += it.qty;
    });
  });
  const equipEntries = Object.entries(byEquip).sort((a,b)=>b[1]-a[1]);
  const deptEntries = Object.entries(byDept).sort((a,b)=>b[1]-a[1]);
  const catEntries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const maxEquip = Math.max(1, ...equipEntries.map(e=>e[1]));
  const maxDept = Math.max(1, ...deptEntries.map(e=>e[1]));
  const activeCount = list.length - returnedCount;

  const deptDetail = {};
  list.forEach(b=>{
    if(!deptDetail[b.dept]) deptDetail[b.dept] = { items:{}, active:0, returned:0, autoReturned:0 };
    const dd = deptDetail[b.dept];
    if(b.status==='active') dd.active++;
    else if(b.status==='returned' || b.status==='early-returned') dd.returned++;
    else if(b.status==='auto-returned') dd.autoReturned++;
    itemGroupsForBorrow(b).forEach(g=>{
      if(!reportItemMatchesCatFilter(g.category)) return;
      if(!dd.items[g.name]) dd.items[g.name] = { category: g.category, qty: 0, returnedQty: 0 };
      dd.items[g.name].qty += g.qty;
      dd.items[g.name].returnedQty += g.returnedQty;
    });
  });
  const deptDetailEntries = Object.entries(deptDetail).sort((a,b)=>(b[1].active+b[1].returned+b[1].autoReturned)-(a[1].active+a[1].returned+a[1].autoReturned));


  const trendMonths = [];
  const now = new Date();
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    trendMonths.push({ y:d.getFullYear(), m:d.getMonth(), label: THAI_MONTHS_SHORT[d.getMonth()]+' '+String(beYear(d.getFullYear())).slice(-2) });
  }
  const trendCounts = trendMonths.map(tm=>{
    return applyReportFilters(state.borrows).filter(b=>{
      const d = new Date(b.borrowDate+'T00:00:00');
      return !isNaN(d) && d.getFullYear()===tm.y && d.getMonth()===tm.m;

  });


  state._reportChartData = {
    catEntries, equipEntries: equipEntries.slice(0,8),
    statusCounts: [activeCount, returnedCount],
    trendLabels: trendMonths.map(t=>t.label), trendCounts,
    deptStatusLabels: deptDetailEntries.map(e=>e[0]),
    deptStatusActive: deptDetailEntries.map(e=>e[1].active),
    deptStatusReturned: deptDetailEntries.map(e=>e[1].returned),
    deptStatusAutoReturned: deptDetailEntries.map(e=>e[1].autoReturned),
  };

  return `
  <div class="mt-5 space-y-6" id="report-root">
    <div class="card p-5 no-print">
      <div class="flex flex-wrap gap-3 items-end">
        <div>
          <label class="lbl">ช่วงเวลา</label>

            <option value="week" ${state.reports.mode==='week'?'selected':''}>รายสัปดาห์</option>

        `:''}

const _reportChartInstances = {};
function _destroyChart(key){
  if(_reportChartInstances[key]){ try{ _reportChartInstances[key].destroy(); }catch(e){} delete _reportChartInstances[key]; }
}
function drawReportCharts(){
  if(!window.Chart) return;
  const data = state._reportChartData;
  if(!data) return;
  const palette = ['#0891b2','#0ea5e9','#dc2626','#a16207','#7c3aed','#15803d','#db2777','#ea580c'];
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  const fontColor = isDark ? '#eaf3f1' : '#16302b';
  Chart.defaults.font.family = "'Sarabun','Kanit',sans-serif";
  Chart.defaults.color = fontColor;

  const catEl = document.getElementById('chart-cat');
  _destroyChart('cat');
  if(catEl && data.catEntries.length){
    _reportChartInstances.cat = new Chart(catEl, {
      type:'doughnut',
      data:{ labels:data.catEntries.map(e=>e[0]), datasets:[{ data:data.catEntries.map(e=>e[1]), backgroundColor:palette }] },
      options:{ maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{boxWidth:10,font:{size:10}} } } }
    });
  }

  const equipEl = document.getElementById('chart-equip');
  _destroyChart('equip');
  if(equipEl && data.equipEntries.length){
    _reportChartInstances.equip = new Chart(equipEl, {
      type:'bar',
      data:{ labels:data.equipEntries.map(e=>e[0].length>14?e[0].slice(0,14)+'…':e[0]), datasets:[{ label:'จำนวน', data:data.equipEntries.map(e=>e[1]), backgroundColor:'#0891b2' }] },
      options:{ maintainAspectRatio:false, indexAxis:'y', plugins:{legend:{display:false}}, scales:{ x:{ ticks:{precision:0} } } }
    });
  }

  const statusEl = document.getElementById('chart-status');
  _destroyChart('status');
  if(statusEl && (data.statusCounts[0]+data.statusCounts[1])>0){
    _reportChartInstances.status = new Chart(statusEl, {
      type:'doughnut',
      data:{ labels:['กำลังยืมอยู่','คืนแล้ว'], datasets:[{ data:data.statusCounts, backgroundColor:['#b45309','#15803d'] }] },
      options:{ maintainAspectRatio:false, plugins:{ legend:{ position:'bottom' } } }
    });
  }

  const trendEl = document.getElementById('chart-trend');
  _destroyChart('trend');
  if(trendEl){
    _reportChartInstances.trend = new Chart(trendEl, {
      type:'line',
      data:{ labels:data.trendLabels, datasets:[{ label:'จำนวนใบยืม', data:data.trendCounts, borderColor:'#0f766e', backgroundColor:'rgba(15,118,110,.15)', tension:.3, fill:true }] },
      options:{ maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true, ticks:{precision:0} } } }
    });
  }

  const deptStatusEl = document.getElementById('chart-dept-status');
  _destroyChart('deptStatus');
  if(deptStatusEl && data.deptStatusLabels && data.deptStatusLabels.length){
    _reportChartInstances.deptStatus = new Chart(deptStatusEl, {
      type:'bar',
      data:{
        labels: data.deptStatusLabels.map(l=>l.length>20?l.slice(0,20)+'…':l),
        datasets:[
          { label:'กำลังยืมอยู่', data:data.deptStatusActive, backgroundColor:'#b45309' },
          { label:'คืนก่อนกำหนด', data:data.deptStatusReturned, backgroundColor:'#15803d' },
          { label:'คืนตามกำหนดอัตโนมัติ', data:data.deptStatusAutoReturned, backgroundColor:'#2563eb' },
        ]
      },
      options:{ maintainAspectRatio:false, indexAxis:'y', plugins:{ legend:{ position:'bottom' } }, scales:{ x:{ stacked:true, ticks:{precision:0} }, y:{ stacked:true } } }
    });
  }
}


function esc(s){ return (s===undefined||s===null)?'':String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s){ return esc(s).replace(/"/g,'&quot;'); }


</script>
<script>

function attachHandlers(){
  root.querySelectorAll('[data-act]').forEach(el=>{
    if(el.tagName==='INPUT' && (el.type==='date'||el.type==='number'||el.type==='text')) return; // handled via change/input below
  });

  root.addEventListener('click', onClick);
  root.addEventListener('change', onChange);
  root.addEventListener('input', onInput);


  bindTextInput('f-name', v=>state.form.name=v);
  bindTextInput('f-position', v=>state.form.position=v);
  bindTextInput('f-notes', v=>state.form.notes=v);
  bindTextInput('form-search-dept', v=>{state.form.dropdownSearch.dept=v; render();});
  bindTextInput('form-search-province', v=>{state.form.dropdownSearch.province=v; render();});
  bindTextInput('m-search', v=>{state.manage.search=v; renderSoft();});
  bindTextInput('ret-search', v=>{state.returnSearch=v; renderSoft();});
  bindTextInput('r-search-dept', v=>{state.reports.filterSearch.dept=v; renderSoft();});
  bindTextInput('r-search-province', v=>{state.reports.filterSearch.province=v; renderSoft();});
  bindTextInput('r-search-category', v=>{state.reports.filterSearch.category=v; renderSoft();});
  bindEnterKey('login-user', doLogin);
  bindEnterKey('login-pass', doLogin);
  bindPhoneInput('f-phone');

  document.addEventListener('click', onDocumentClickCloseFilterDropdown);
}
function onDocumentClickCloseFilterDropdown(e){
  if(state.reports.openFilterDropdown && !e.target.closest('[data-dropdown]')){
    state.reports.openFilterDropdown = null;
    render();
    return;
  }
  if(state.form.openDropdown && !e.target.closest('[data-dropdown]')){
    state.form.openDropdown = null;
    render();
    return;
  }
}
function bindTextInput(id, setter){
  const el = document.getElementById(id);
  if(el) el.addEventListener('input', ()=>setter(el.value));
}
function bindEnterKey(id, onEnter){
  const el = document.getElementById(id);
  if(el) el.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); onEnter(); } });
}
function bindPhoneInput(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.addEventListener('input', ()=>{
    const digitsOnly = el.value.replace(/[^0-9]/g,'');
    if(el.value !== digitsOnly) el.value = digitsOnly;
    state.form.phone = digitsOnly;
  });
}
function renderSoft(){ render(); }

function onClick(e){
  const el = e.target.closest('[data-act]');
  if(!el) return;
  const act = el.dataset.act;

 
  if(el.classList.contains('modal-backdrop') && e.target !== el) return;

  if(act==='tab'){ state.tab = el.dataset.tab; state.lastCreatedBorrowId=null; state.lastCreatedReturnId=null; render(); return; }
  if(act==='toggle-theme'){ toggleTheme(); return; }
  if(act==='logout'){ state.loggedIn=false; state.loggedInUser=null; render(); return; }
  if(act==='do-login'){ doLogin(); return; }
  if(act==='reset-form'){ resetForm(); render(); return; }
  if(act==='dismiss-banner'){ state.lastCreatedBorrowId=null; render(); return; }
  if(act==='toggle-cat'){ toggleCat(el.dataset.cat); render(); return; }
  if(act==='toggle-tool'){ toggleTool(el.dataset.cat, el.dataset.name); render(); return; }
  if(act==='submit-borrow'){ submitBorrow(); return; }
  if(act==='confirm-submit-borrow'){ confirmSubmitBorrow(); return; }
  if(act==='cancel-confirm-borrow'){ cancelConfirmBorrow(); return; }
  if(act==='print-slip'){ printSlip(el.dataset.id); return; }
  if(act==='download-slip'){ downloadSlip(el.dataset.id); return; }
  if(act==='download-slip-pdf'){ downloadSlipPDF(el.dataset.id); return; }
  if(act==='mailto-notify'){ notifyAdmin(el.dataset.id); return; }
  if(act==='mview'){ state.manage.view = el.dataset.v; render(); return; }
  if(act==='add-equip'){ state.manage.editing='new'; render(); return; }
  if(act==='edit-equip'){ state.manage.editing=el.dataset.id; render(); return; }
  if(act==='close-modal'){ state.manage.editing=null; render(); return; }
  if(act==='save-equip'){ saveEquipModal(el.dataset.id); return; }
  if(act==='del-equip'){ delEquip(el.dataset.id); return; }
  if(act==='clear-equip'){ clearEquip(); return; }
  if(act==='cal-prev'){ calShift(-1); return; }
  if(act==='cal-next'){ calShift(1); return; }
  if(act==='cal-day'){ state.calendar.selectedDay = parseInt(el.dataset.day); render(); return; }
  if(act==='return-early'){ returnBorrowEarly(el.dataset.id); return; }
  if(act==='dismiss-return-banner'){ state.lastCreatedReturnId=null; render(); return; }
  if(act==='export-excel'){ exportExcel(); return; }
  if(act==='print-report'){ printReport(); return; }
  if(act==='clear-report-filters'){ clearReportFilters(); return; }
  if(act==='clear-dashboard-data'){ clearDashboardData(); return; }
  if(act==='toggle-filter-dropdown'){ const t=el.dataset.ftype; const wasOpen = state.reports.openFilterDropdown===t; state.reports.openFilterDropdown = wasOpen ? null : t; if(!wasOpen) state.reports.filterSearch[t] = ''; render(); return; }
  if(act==='toggle-report-filter'){ toggleReportFilter(el.dataset.ftype, el.dataset.fval); return; }
  if(act==='toggle-form-dropdown'){ const t=el.dataset.ftype; const wasOpen = state.form.openDropdown===t; state.form.openDropdown = wasOpen ? null : t; if(!wasOpen) state.form.dropdownSearch[t] = ''; render(); return; }
  if(act==='select-form-dropdown-item'){ const t=el.dataset.ftype; state.form[t] = el.dataset.fval; state.form.openDropdown = null; state.form.dropdownSearch[t] = ''; render(); return; }
}

function onChange(e){
  const el = e.target;
  const act = el.dataset && el.dataset.act;

  if(el.id==='f-borrowdate'){ state.form.borrowDate = el.value; updateDateHint(el); return; }
  if(el.id==='f-returndate'){ state.form.returnDate = el.value; updateDateHint(el); return; }

  if(act==='qty-tool'){ setQty(el.dataset.cat, el.dataset.name, parseInt(el.value)||1); return; }
  if(act==='edit-status'){ updateEquipField(el.dataset.id,'useStatus',el.value); return; }
  if(act==='edit-calib'){ updateCalibDate(el.dataset.id, el.value); return; }

  if(el.id==='m-cat'){ state.manage.catFilter = el.value; render(); return; }
  if(el.id==='m-status'){ state.manage.statusFilter = el.value; render(); return; }
  if(el.id==='import-file'){ importExcel(el.files[0]); return; }

  if(el.id==='r-mode'){ state.reports.mode = el.value; render(); return; }
  if(el.id==='r-week'){ state.reports.weekStart = el.value; render(); return; }
  if(el.id==='r-month'){ state.reports.month = parseInt(el.value); render(); return; }
  if(el.id==='r-year'){ state.reports.year = (parseInt(el.value)||beYear(new Date().getFullYear())) - 543; render(); return; }
  if(el.id==='r-half'){ state.reports.half = el.value; render(); return; }
  if(el.id==='r-fy'){ state.reports.fy = parseInt(el.value); render(); return; }
  if(el.id==='r-fy2'){ state.reports.fy = parseInt(el.value); render(); return; }

}
function onInput(e){
  const el = e.target;
  if(el.id==='f-borrowdate'){ state.form.borrowDate = el.value; updateDateHint(el); return; }
  if(el.id==='f-returndate'){ state.form.returnDate = el.value; updateDateHint(el); return; }
}

function updateDateHint(inputEl){
  const hintEl = inputEl.nextElementSibling;
  if(hintEl && hintEl.classList && hintEl.classList.contains('hint-be')){
    const val = inputEl.value;
    if(val){
      const d = new Date(val+'T00:00:00');
      hintEl.textContent = isNaN(d) ? '' : 'พ.ศ. '+beYear(d.getFullYear());
    } else {
      hintEl.textContent = '';
    }
  }
}


const ADMIN_ACCOUNTS = [
  { user:'admin', pass:'@123456' },
  { user:'admintong', pass:'@123456' },
];
function doLogin(){
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  const found = ADMIN_ACCOUNTS.find(a=>a.user===u && a.pass===p);
  if(found){
    state.loggedIn = true;
    state.loggedInUser = found.user;
    render();
  } else {
    document.getElementById('login-err').classList.remove('hidden');
  }
}


function resetForm(){
  state.form = { dept:'', name:'', phone:'', position:'', borrowDate:'', returnDate:'', province:'', notes:'', selectedCats:[], picks:{}, openDropdown:null, dropdownSearch:{dept:'',province:''} };
}
function toggleCat(cat){
  const i = state.form.selectedCats.indexOf(cat);
  if(i>=0) state.form.selectedCats.splice(i,1);
  else state.form.selectedCats.push(cat);
}
function pickKey(cat,name){ return name+'|'+cat; }
function toggleTool(cat, name){
  const key = pickKey(cat,name);
  if(state.form.picks[key]) delete state.form.picks[key];
  else state.form.picks[key] = 1;
}
function setQty(cat, name, qty){
  const key = pickKey(cat,name);
  if(state.form.picks[key]!==undefined) state.form.picks[key] = Math.max(1, qty);
}

function buildBorrowDraft(){
  const f = state.form;
  const nameEl = document.getElementById('f-name');
  const phoneEl = document.getElementById('f-phone');
  const posEl = document.getElementById('f-position');
  const noteEl = document.getElementById('f-notes');
  f.name = nameEl?nameEl.value:f.name;
  f.phone = phoneEl?phoneEl.value:f.phone;
  f.position = posEl?posEl.value:f.position;
  f.notes = noteEl?noteEl.value:f.notes;

  const errs = [];
  if(!f.dept) errs.push('กรุณาเลือกหน่วยงานผู้ยืม');
  if(!f.name) errs.push('กรุณากรอกชื่อ-นามสกุลผู้ยืม');
  if(!f.borrowDate) errs.push('กรุณาเลือกวันที่ยืม');
  if(!f.returnDate) errs.push('กรุณาเลือกวันที่คืน');
  if(f.borrowDate && f.returnDate && f.returnDate < f.borrowDate) errs.push('วันที่คืนต้องไม่ก่อนวันที่ยืม');
  if(!f.province) errs.push('กรุณาระบุพื้นที่ปฏิบัติงาน');
  if(!PROVINCES.includes(f.province)) errs.push('กรุณาเลือกจังหวัดจากรายการที่ค้นหา');
  const pickKeys = Object.keys(f.picks);
  if(pickKeys.length===0) errs.push('กรุณาเลือกเครื่องมืออย่างน้อย 1 รายการ');

  if(errs.length) return { errs };

  const items = [];
  for(const key of pickKeys){
    const lastSep = key.lastIndexOf('|');
    const name = key.slice(0,lastSep), cat = key.slice(lastSep+1);
    const qty = f.picks[key];
    const group = groupEquipment(cat).find(g=>g.name===name);
    if(!group || group.availItems.length < qty){
      return { errs: [`เครื่องมือ "${name}" มีจำนวนคงเหลือไม่พอ (เหลือ ${group?group.availItems.length:0})`] };
    }
    const chosen = group.availItems.slice(0, qty);
    chosen.forEach(u=>{
      items.push({ equipmentId: u.id, name: u.name, assetCode: u.assetCode, category: cat, qty: 1 });
    });
   
  }
  
  const grouped = {};
  items.forEach(it=>{
    if(!grouped[it.name]) grouped[it.name] = { name: it.name, assetCode: it.assetCode, category: it.category, qty: 0, unitIds: [] };
    grouped[it.name].qty += 1;
    grouped[it.name].unitIds.push(it.equipmentId);
    if(grouped[it.name].qty>1) grouped[it.name].assetCode = grouped[it.name].unitIds.map(id=>{
      const u = state.equipment.find(x=>x.id===id); return u?u.assetCode:'';
    }).join(', ');
  });
  const finalItems = Object.values(grouped).map(g=>({
    name: g.name, assetCode: g.assetCode, category: g.category, qty: g.qty,
    equipmentId: g.unitIds[0], equipmentIds: g.unitIds
  }));

  const now = new Date();
  const borrow = {
    id: uid('BR'),
    code: nextBorrowCode(f.dept),
    createdAt: now.toISOString(),
    createdTime: nowTimeStr(),
    dept: f.dept, name: f.name, phone: f.phone, position: f.position,
    borrowDate: f.borrowDate, returnDate: f.returnDate, province: f.province, notes: f.notes,
    items: finalItems.map(it=>({ equipmentId: it.equipmentId, equipmentIds: it.equipmentIds, name: it.name, assetCode: it.assetCode, category: it.category, qty: it.qty })),
    status: 'active',
  };

  borrow.itemsExpanded = [];
  finalItems.forEach(it=> it.equipmentIds.forEach(id=> borrow.itemsExpanded.push({equipmentId:id})));

  return { errs: [], borrow };
}


function submitBorrow(){
  const { errs, borrow } = buildBorrowDraft();
  if(errs.length){ alert(errs.join('\n')); return; }
  state.pendingBorrow = borrow;
  render();
}
function cancelConfirmBorrow(){
  state.pendingBorrow = null;
  render();
}

async function confirmSubmitBorrow(){
  const borrow = state.pendingBorrow;
  if(!borrow) return;
  state.borrows.push(borrow);
  await saveBorrows();
  state.lastCreatedBorrowId = borrow.id;
  state.pendingBorrow = null;
  resetForm();
  render();

  notifyAdmin(borrow.id, { auto:true });
}


async function notifyAdmin(id, opts={}){
  const auto = !!opts.auto;
  const b = state.borrows.find(x=>x.id===id);
  if(!b) return;
  const itemsText = b.items.map(i=>i.name+' x'+i.qty).join(', ');
  const subject = `แจ้งใบยืมเครื่องมือใหม่ ${b.code}`;

  state.notifyStatus[id] = 'sending';
  render();

  let slipLink = '';
  try{
    slipLink = await uploadSlipPDFToCloudinary(b);
  }catch(err){ /* อัปโหลดไม่สำเร็จ -> ส่งอีเมลแบบไม่มีลิงก์ไฟล์แทน */ }

  const bodyPlain = `มีใบยืมเครื่องมือใหม่เข้าระบบ\n\nรหัสใบยืม: ${b.code}\nผู้ยืม: ${b.name} (${b.dept})\nวันที่ยืม: ${fmtDateBE(b.borrowDate)}\nวันที่คืน: ${fmtDateBE(b.returnDate)}\nรายการ: ${itemsText}\n${slipLink ? ('\nไฟล์ใบยืม (PDF): '+slipLink+'\n') : ''}\n(ส่งจากระบบใบยืมเครื่องมือ)`;

  const baseParams = {
    to_email: 'bank.nj15@gmail.com',
    subject, code: b.code, name: b.name, dept: b.dept,
    borrow_date: fmtDateBE(b.borrowDate), return_date: fmtDateBE(b.returnDate),
    items: itemsText, message: bodyPlain,
    slip_link: slipLink || 'ไม่สามารถสร้างลิงก์ไฟล์ได้ในครั้งนี้ กรุณากด "ดาวน์โหลด PDF" ในระบบแทน',
  };

  if(EMAILJS_READY && window.emailjs){
    try{
      await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, baseParams);
      state.notifyStatus[id] = slipLink ? 'sent' : 'sent_no_link';
      if(!auto){
        alert(slipLink
          ? 'ส่งอีเมลแจ้งเตือนไปที่ bank.nj15@gmail.com สำเร็จแล้ว พร้อมลิงก์ดาวน์โหลด PDF'
          : 'ส่งอีเมลแจ้งเตือนสำเร็จ แต่ไม่มีลิงก์ไฟล์ (ยังไม่ได้ตั้งค่า Cloudinary หรืออัปโหลดไม่สำเร็จ)');
      }
    }catch(err){
      state.notifyStatus[id] = 'failed';
      if(!auto){
        alert('ส่งอีเมลอัตโนมัติไม่สำเร็จ (' + (err && err.text || err) + ')\nจะเปิดโปรแกรมอีเมลให้กดส่งเองแทน');
        window.location.href = `mailto:bank.nj15@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyPlain)}`;
      }
    }
  } else {
    // ยังไม่ได้ตั้งค่า EmailJS -> ใช้ mailto (เปิดโปรแกรมอีเมลของเครื่อง แล้วผู้ใช้กดส่งเอง)
    state.notifyStatus[id] = 'failed';
    if(!auto){
      window.location.href = `mailto:bank.nj15@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyPlain)}`;
    }
  }
  render();
}

/* ===================== Manage equipment logic ===================== */
async function updateEquipField(id, field, value){
  const e = state.equipment.find(x=>x.id===id);
  if(!e) return;
  e[field] = value;
  await saveEquipment();
  render();
}
async function updateCalibDate(id, value){
  const e = state.equipment.find(x=>x.id===id);
  if(!e) return;
  e.lastCalib = value;
  if(value && e.calibCycle){
    const d = new Date(value+'T00:00:00');
    d.setFullYear(d.getFullYear() + parseInt(e.calibCycle||1));
    e.nextCalib = d.toISOString().slice(0,10);
  }
  await saveEquipment();
  render();
}
async function delEquip(id){
  if(!confirm('ยืนยันการลบเครื่องมือนี้?')) return;
  state.equipment = state.equipment.filter(e=>e.id!==id);
  await saveEquipment();
  render();
}
async function clearEquip(){
  if(!confirm('ยืนยันล้างฐานข้อมูลเครื่องมือทั้งหมด? การกระทำนี้ไม่สามารถย้อนกลับได้')) return;
  state.equipment = [];
  await saveEquipment();
  render();
}
async function saveEquipModal(id){
  const val = fid=>document.getElementById(fid).value;
  const obj = {
    category: val('em-category'), name: val('em-name'), assetCode: val('em-assetCode'),
    brand: val('em-brand'), model: val('em-model'), serial: val('em-serial'),
    condition: val('em-condition'), useStatus: val('em-useStatus'),
    lastCalib: val('em-lastCalib'), calibCycle: parseInt(val('em-calibCycle'))||1,
    yearGot: val('em-yearGot'), params: val('em-params'),
  };
  if(!obj.name){ alert('กรุณากรอกชื่อเครื่องมือ'); return; }
  if(obj.lastCalib){
    const d = new Date(obj.lastCalib+'T00:00:00');
    d.setFullYear(d.getFullYear()+obj.calibCycle);
    obj.nextCalib = d.toISOString().slice(0,10);
  } else obj.nextCalib = null;

  if(id){
    const e = state.equipment.find(x=>x.id===id);
    Object.assign(e, obj);
  } else {
    obj.id = uid('EQ');
    state.equipment.push(obj);
  }
  await saveEquipment();
  state.manage.editing = null;
  render();
}

/* Excel import using SheetJS */
function importExcel(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false});
      const header = rows[0];
      const newItems = [];
      for(let i=1;i<rows.length;i++){
        const r = rows[i];
        if(!r || !r[1]) continue;
        newItems.push({
          id: uid('EQ'),
          category: r[0]||'', name: r[1]||'', dept: r[2]||'', yearGot: r[3]||'',
          condition: r[4]||'', calibStatus: r[5]||'', useStatus: r[6]||'ใช้งานได้',
          lastCalib: r[7]? excelDateToISO(r[7]) : null,
          calibCycle: r[8]||1,
          nextCalib: r[9]? excelDateToISO(r[9]) : null,
          brand: r[10]||'', model: r[11]||'', serial: r[12]||'', assetCode: r[13]||'', params: r[14]||'',
        });
      }
      if(newItems.length===0){ alert('ไม่พบข้อมูลเครื่องมือในไฟล์ที่นำเข้า'); return; }
      const merge = confirm(`พบเครื่องมือ ${newItems.length} รายการในไฟล์\n\nกด "ตกลง" เพื่อ "เพิ่มต่อ" ในฐานข้อมูลเดิม\nกด "ยกเลิก" เพื่อ "แทนที่" ฐานข้อมูลเดิมทั้งหมด`);
      if(merge) state.equipment = state.equipment.concat(newItems);
      else state.equipment = newItems;
      await saveEquipment();
      render();
      alert('นำเข้าข้อมูลสำเร็จ');
    }catch(err){
      alert('เกิดข้อผิดพลาดในการอ่านไฟล์: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}
function excelDateToISO(v){
  if(!v) return null;
  if(v instanceof Date) return v.toISOString().slice(0,10);
  const d = new Date(v);
  if(!isNaN(d)) return d.toISOString().slice(0,10);
  return null;
}

/* ===================== Calendar logic ===================== */
function calShift(dir){
  let m = state.calendar.month + dir;
  let y = state.calendar.year;
  if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
  state.calendar.month=m; state.calendar.year=y; state.calendar.selectedDay=null;
  render();
}
async function returnBorrowEarly(id){
  const b = state.borrows.find(x=>x.id===id);
  if(!b) return;
  if(!confirm(`ยืนยันคืนเครื่องมือก่อนกำหนดสำหรับใบยืม ${b.code} (${b.name})?\nเครื่องมือทุกชิ้นในใบยืมนี้จะกลับมาว่างให้ยืมใหม่ได้ทันที`)) return;
  const nowIso = todayISO();
  (b.itemsExpanded||[]).forEach(rec=>{ if(!rec.returned){ rec.returned = true; rec.returnedAt = nowIso; } });
  b.status = 'early-returned';
  b.earlyReturnedAt = new Date().toISOString();
  await saveBorrows();
  render();
}

/* ===================== Auto-return เมื่อครบกำหนดคืน ===================== */
// เมื่อถึง/เกินวันครบกำหนดคืน (returnDate) ของใบยืมที่ยัง 'active' ระบบจะปิดใบยืมและคืนเครื่องมือ
// ให้อัตโนมัติ โดยใช้สถานะ 'auto-returned' แยกออกจาก 'returned' (คืนเอง) และ 'early-returned' (คืนก่อนกำหนด)
function autoReturnOverdueBorrows(){
  const today = todayISO();
  let changed = false;
  state.borrows.forEach(b=>{
    if(b.status==='active' && b.returnDate && b.returnDate<=today){
      (b.itemsExpanded||[]).forEach(rec=>{ if(!rec.returned){ rec.returned = true; rec.returnedAt = today; } });
      b.status = 'auto-returned';
      b.autoReturnedAt = new Date().toISOString();
      changed = true;
    }
  });
  return changed;
}
/* ===================== Reports export/print ===================== */
function statusLabelTH(status){
  if(status==='early-returned') return 'คืนก่อนกำหนด';
  if(status==='auto-returned') return 'คืนตามกำหนดอัตโนมัติ';
  if(status==='returned') return 'คืนแล้ว';
  return 'กำลังยืมอยู่';
}
function exportExcel(){
  const range = getReportRange();
  const list = filterBorrowsByRange(range);
  const rows = [['รหัสใบยืม','วันที่ยืม','วันที่คืน','หน่วยงาน','ผู้ยืม','เบอร์โทร','พื้นที่','รายการเครื่องมือ','สถานะ']];
  list.forEach(b=>{
    rows.push([b.code, fmtDateShort(b.borrowDate), fmtDateShort(b.returnDate), b.dept, b.name, b.phone||'', b.province, b.items.map(i=>i.name+' x'+i.qty).join(', '), statusLabelTH(b.status)]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'รายงาน');
  XLSX.writeFile(wb, `รายงานการยืมเครื่องมือ_${todayISO()}.xlsx`);
}
function printReport(){
  document.body.classList.add('printing-report');
  window.print();
  setTimeout(()=>document.body.classList.remove('printing-report'), 500);
}

/* ===================== Realtime sync (polling) =====================
   window.storage ไม่รองรับการ "push" ข้อมูลแบบทันที (real push / WebSocket)
   จึงใช้วิธี "polling" คือดึงข้อมูลล่าสุดจากพื้นที่เก็บข้อมูลกลาง (shared storage)
   มาเทียบกับข้อมูลบนหน้าจอทุก ๆ ไม่กี่วินาที ถ้าพบว่าเปลี่ยนแปลง (เช่นมีคนอื่นยืม/คืน/แก้ไข
   เครื่องมือจากเครื่องอื่น) จะอัปเดตหน้าจอให้อัตโนมัติโดยไม่รบกวนช่องที่กำลังพิมพ์อยู่
====================================================================== */
let _syncBusy = false;
async function pollRealtimeUpdates(){
  if(_syncBusy) return;
  _syncBusy = true;
  try{
    const [eq, br] = await Promise.all([ stGet('equipment:list', true), stGet('borrows:list', true) ]);
    let changed = false;
    if(Array.isArray(eq)){
      const cur = JSON.stringify(state.equipment), next = JSON.stringify(eq);
      if(cur !== next){ state.equipment = eq; changed = true; }
    }
    if(Array.isArray(br)){
      const cur = JSON.stringify(state.borrows), next = JSON.stringify(br);
      if(cur !== next){ state.borrows = br; changed = true; }
    }
    // ตรวจสอบใบยืมที่ครบ/เกินกำหนดคืน แล้วปิดใบยืม+คืนเครื่องมือให้อัตโนมัติ
    if(autoReturnOverdueBorrows()){
      changed = true;
      await saveBorrows();
    }
    if(changed) render();
  }catch(e){ /* เงียบไว้ ไม่รบกวนผู้ใช้ถ้าเน็ตหลุดชั่วคราว */ }
  finally{ _syncBusy = false; }
}
function startRealtimeSync(intervalMs){
  setInterval(pollRealtimeUpdates, intervalMs || 6000);
  // ซิงก์ทันทีเมื่อผู้ใช้กลับมาที่แท็บ/หน้าต่างนี้อีกครั้ง
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) pollRealtimeUpdates(); });
}

/* ===================== นาฬิกาแสดงวันที่/เวลาปัจจุบันบนหัวเว็บ ===================== */
function updateLiveClock(){
  const el = document.getElementById('live-clock');
  if(!el) return;
  const d = new Date();
  const dateStr = `${THAI_DAYS[d.getDay()]}ที่ ${d.getDate()} ${THAI_MONTHS[d.getMonth()]} พ.ศ. ${beYear(d.getFullYear())}`;
  const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')} น.`;
  el.textContent = `🕐 ${dateStr} — ${timeStr}`;
}
function startLiveClock(){
  updateLiveClock();
  setInterval(updateLiveClock, 1000);
}

/* ===================== Boot ===================== */
(async function boot(){
  await initData();
  if(autoReturnOverdueBorrows()){ await saveBorrows(); }
  render();
  startRealtimeSync(1800000); // 30 นาที (30 * 60 * 1000 ms)
  startLiveClock();
})();
